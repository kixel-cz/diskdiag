name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            cc: gcc
            ldflags: -static
          - runner: macos-latest
            os: macos
            arch: arm64
            cc: clang
            ldflags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          ${{ matrix.cc }} -O2 -Wall -Wextra -std=c11 \
            ${{ matrix.ldflags }} \
            -o diskdiag-${{ matrix.os }}-${{ matrix.arch }} \
            diskdiag.c -lm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: diskdiag-${{ matrix.os }}-${{ matrix.arch }}
          path: diskdiag-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/diskdiag-*